<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoftClaude</title>
  <link rel="icon" href="https://drive.google.com/thumbnail?sz=w300&id=1ZXllEoq0UxcYzDkAlP6DTe6_pvxG3Ft4">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Barre de navigation persistante -->
  <div class="top-bar">
    <button id="menu-toggle" class="openbtn">☰</button>
    <img id="top-bar-logo" src="https://drive.google.com/thumbnail?sz=w300&id=1PwzzDJu1FnMuykyxgeEvupoQo1BLAX_5" alt="Logo" class="top-bar-logo" referrerpolicy="no-referrer">
    <span id="brand-name">SoftClaude</span>
    <button id="theme-toggle" class="theme-btn">🌙</button>
  </div>

  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  
  <!-- Sidebar -->
  <nav id="sidebar" class="sidebar">
    <div class="nav-group">
      <span class="nav-link-text" data-page="home">🏠 Accueil</span>
    </div>
    
    <div class="nav-group flyout">
      <span class="nav-link-text">▶️ Média</span>
      <span class="chevron">▶</span>
      <div class="submenu">
        <a href="#" data-page="video">🎬 Vidéo</a>
        <a href="#" data-page="musique">🎶 Musique</a>
      </div>
    </div>
    
    <div class="nav-group flyout">
      <span class="nav-link-text">📊 Gestion</span>
      <span class="chevron">▶</span>
      <div class="submenu">
        <a href="#" data-page="finance">💰 Finance</a>
        <a href="#" data-page="agenda">📅 Agenda</a>
      </div>
    </div>
    
    <div class="nav-group flyout">
      <span class="nav-link-text">💬 Communication</span>
      <span class="chevron">▶</span>
      <div class="submenu">
        <a href="#" data-page="mail">✉️ Mail</a>
        <a href="#" data-page="contact">👤 Contact</a>
        <a href="#" data-page="siphon">🚰 Siphon</a>
      </div>
    </div>
    
    <div class="nav-group">
      <span class="nav-link-text" data-page="store">🏪 Store</span>
    </div>
    
    <div class="nav-group flyout">
      <span class="nav-link-text">🚀 Productivité</span>
      <span class="chevron">▶</span>
      <div class="submenu">
        <a href="#" data-page="recherche-emploi">🔍 Recherche d'emploi</a>
      </div>
    </div>
    
    <div class="nav-group">
      <span class="nav-link-text" data-page="ia">🤖 IA</span>
    </div>
    
    <div class="nav-group">
      <span class="nav-link-text" data-page="parametres">⚙️ Paramètres</span>
    </div>
  </nav>
  
  <!-- Console de débogage -->
  <div id="debug-console">
    <div id="debug-close">×</div>
    <div id="debug-logs"></div>
  </div>

  <!-- Contenu principal -->
  <main id="main">
    <div id="page-content">
      <!-- Le contenu sera chargé dynamiquement ici -->
    </div>
  </main>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
