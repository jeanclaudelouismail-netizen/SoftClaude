<div class="module-header">
  <button class="openbtn" onclick="showHome()">&larr;</button>
  <h2>💬 Communication</h2>
</div>

<div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 25px;">
  <div class="card" style="margin: 0; width: fit-content; max-width: 100%; text-align: center;">
    <h3 style="margin-top: 0;">Mail</h3>
    <p>Accès direct à vos services mail.</p>
    <div class="card-actions" style="justify-content: center;">
      <button class="btn-oval" style="background-color: white; color: #3c4043; border: 1px solid #dadce0; display: inline-flex; align-items: center; gap: 10px; padding: 10px 25px;" onclick="window.open('https://mail.google.com', '_blank')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Gmail_icon_%282020%29.svg" alt="Gmail" style="width: 20px; height: auto;">
        <span style="font-weight: 600;">Gmail</span>
      </button>
      <button class="btn-oval" style="background-color: #0078d4; color: white; border: none; display: inline-flex; align-items: center; padding: 10px 25px;" onclick="window.open('https://outlook.live.com', '_blank')">
        <span style="font-weight: 600;">Outlook</span>
      </button>
    </div>
    <div class="card-actions" style="justify-content: center; margin-top: 10px;">
      <button class="btn-oval" onclick="router.navigate('mail')">✉️ Tous mes comptes</button>
    </div>
  </div>

  <div class="card" style="margin: 0; width: fit-content; max-width: 100%; text-align: center;">
    <h3 style="margin-top: 0;">Contacts</h3>
    <p>Votre répertoire de contacts personnel.</p>
    <div class="card-actions" style="justify-content: center;">
      <button class="btn-oval" onclick="router.navigate('contact')">👤 Contact</button>
    </div>
  </div>

  <div class="card" style="margin: 0; width: fit-content; max-width: 100%; text-align: center;">
    <h3 style="margin-top: 0;">Messagerie instantané</h3>
    <p>Discutez en temps réel avec vos proches.</p>
    <div class="card-actions" style="justify-content: center;">
      <button class="btn-oval" style="background-color: #0084FF; color: white; border: none; display: inline-flex; align-items: center; gap: 10px; padding: 10px 25px;" onclick="window.open('https://www.messenger.com/e2ee/t/7581216541914187/', '_blank')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/be/Facebook_Messenger_logo_2020.svg" alt="Messenger" style="width: 20px; height: auto;">
        <span style="font-weight: 600;">Messenger</span>
      </button>
      <button class="btn-oval" style="background-color: #25D366; color: white; border: none; display: inline-flex; align-items: center; gap: 10px; padding: 10px 25px;" onclick="window.open('https://web.whatsapp.com/', '_blank')">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" style="width: 20px; height: auto;">
        <span style="font-weight: 600;">WhatsApp</span>
      </button>
    </div>
  </div>
</div>

<div class="card" style="margin-top: 25px; width: fit-content; max-width: 100%; margin-left: auto; margin-right: auto; text-align: center;">
  <h3 style="margin-top: 0;">Réseaux</h3>
  <p>Accès aux modules de gestion des flux et réseaux sociaux.</p>
  <div class="card-actions" style="justify-content: center;">
    <button class="btn-oval" onclick="router.navigate('siphon')">Accéder au Siphon 🚰</button>
    <button class="btn-oval" style="background-color: #1877F2; color: white; border: none; display: inline-flex; align-items: center; gap: 10px; padding: 10px 25px;" onclick="window.open('https://www.facebook.com', '_blank')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      <span style="font-weight: 600;">Facebook</span>
    </button>
    <button class="btn-oval" style="background-color: #0085FF; color: white; border: none; display: inline-flex; align-items: center; gap: 10px; padding: 10px 25px;" onclick="window.open('https://bsky.app', '_blank')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 10.8c-1.32-2.36-4.52-7.53-7.73-8.6C2.17 1.5 0 2.44 0 5.24 0 6.13.43 10.3 1.05 11.88 2.2 14.82 5.56 15.84 8.64 15.35c-4.14.73-7.53 2.6-7.53 6.07 0 2.94 2.17 3.9 4.27 3.32 3.21-1.07 6.41-6.24 7.73-8.6 1.32 2.36 4.52 7.53 7.73 8.6 2.1 0.58 4.27-0.38 4.27-3.32 0-3.47-3.39-5.34-7.53-6.07 3.08 0.49 6.44-0.53 7.59-3.47 0.62-1.58 1.05-5.75 1.05-6.64 0-2.8-2.17-3.74-4.27-3.16-3.21 1.07-6.41 6.24-7.73 8.6Z"/></svg>
      <span style="font-weight: 600;">BlueSky</span>
    </button>
  </div>
</div>
